<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCFD // 危險物品辨識資料庫</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #03a9f4;
            --danger: #f44336;
            --warning: #ffeb3b;
            --safe: #4caf50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0 15px 50px 15px;
        }

        /* 置頂懸浮標題列 */
        .top-bar {
            position: sticky;
            top: 0;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 0 -15px 20px -15px;
            border-bottom: 1px solid #333;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .top-bar h1 { margin: 0; color: var(--accent-color); font-size: 1.2rem; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.1rem; border-left: 5px solid var(--accent-color); padding-left: 10px; margin-top: 0; margin-bottom: 15px; color: white; }

        /* 搜尋列 */
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            background: #2a2a2a;
            border: 2px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus { border-color: var(--accent-color); }

        /* Class 1-9 參考圖例區塊 */
        .class-ref-container {
            margin-top: 20px;
            border-top: 1px dashed #444;
            padding-top: 15px;
        }
        .class-ref-title { font-size: 0.9rem; color: #888; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .class-ref-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .class-item {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px 5px 10px 5px;
            text-align: center;
            font-size: 0.8rem;
            color: #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 100% 離線版 UN 菱形牌 (純 CSS 繪製) */
        .un-diamond {
            width: 45px;
            height: 45px;
            position: relative;
            transform: rotate(45deg);
            border: 2px solid white;
            margin: 0 auto 15px auto;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        .un-content {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transform: rotate(-45deg); /* 將內容轉正 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2px 0;
            box-sizing: border-box;
        }
        .un-sym { font-size: 1.1rem; line-height: 1.2; }
        .un-num { font-size: 0.95rem; font-weight: 900; line-height: 1; }

        /* UN 菱形牌顏色與條紋設定 (-45deg 抵銷外框旋轉) */
        .un-c1 { background: #ff9800; color: black; border-color: #ff9800; }
        .un-c2 { background: #4caf50; color: white; border-color: #4caf50; }
        .un-c3 { background: #f44336; color: white; border-color: #f44336; }
        .un-c4 { background: repeating-linear-gradient(-45deg, #f44336, #f44336 6px, white 6px, white 12px); color: black; border-color: #ccc; }
        .un-c4 .un-num { background: rgba(255,255,255,0.9); border-radius: 50%; padding: 0 4px; }
        .un-c5 { background: #ffeb3b; color: black; border-color: #ffeb3b; }
        .un-c6 { background: white; color: black; border-color: #ccc; }
        .un-c7 { background: linear-gradient(-45deg, #ffeb3b 50%, white 50%); color: black; border-color: #ccc; }
        .un-c8 { background: linear-gradient(-45deg, white 50%, black 50%); color: white; border-color: #ccc; }
        .un-c8 .un-sym { color: black; }
        .un-c9 { background: linear-gradient(-45deg, transparent 50%, white 50%), repeating-linear-gradient(-45deg, black, black 4px, white 4px, white 8px); color: black; border-color: #ccc; }

        /* 搜尋建議列表 */
        #search-results { margin-top: 10px; display: none; }
        .result-item {
            padding: 12px 15px;
            background: #333;
            border-bottom: 1px solid #444;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .result-item:first-child { border-radius: 8px 8px 0 0; }
        .result-item:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
        .result-item:active { background: var(--accent-color); color: black; }
        .badge-un { background: #ff9800; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; margin-right: 8px; }

        /* 內容顯示區 - 預設隱藏 */
        #detail-view { display: none; }

        /* NFPA 704 菱形圖與圖例區塊 */
        .nfpa-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
            background: #222;
            padding: 20px;
            border-radius: 12px;
        }
        .nfpa-diamond {
            width: 100px;
            height: 100px;
            position: relative;
            transform: rotate(45deg);
            flex-shrink: 0;
        }
        .nfpa-quad {
            width: 50%; height: 50%; position: absolute;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: 900; color: black;
            transform: rotate(-45deg); 
        }
        .nfpa-red { background: #f44336; top: 0; left: 0; border: 2px solid white; border-bottom: none; border-right: none;}
        .nfpa-blue { background: #2196f3; top: 0; right: 0; border: 2px solid white; border-bottom: none; border-left: none; color: white;}
        .nfpa-yellow { background: #ffeb3b; bottom: 0; left: 0; border: 2px solid white; border-top: none; border-right: none;}
        .nfpa-white { background: #ffffff; bottom: 0; right: 0; border: 2px solid white; border-top: none; border-left: none; font-size: 1.1rem;}

        .nfpa-legend { display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.95rem; }
        .color-box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }

        /* 資料列設計 */
        .data-row {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #555;
        }
        .data-label { font-size: 0.85rem; color: #aaa; margin-bottom: 4px; font-weight: bold; }
        .data-value { font-size: 1.1rem; color: white; font-weight: bold; }
        .warn-high { border-left-color: var(--danger); }
        .warn-high .data-value { color: #ff5252; }

        .ghs-badge {
            display: inline-block;
            background: #fff;
            color: black;
            border: 2px solid red;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .class-badge {
            display: inline-block;
            background: #ff9800;
            color: black;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>HCFD // 危害辨識 (HAZMAT)</h1>
        <button class="reset-btn-top" onclick="resetSearch()" style="background:#444; color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:bold;">清除</button>
    </div>

    <!-- 檢索區 -->
    <div class="card" id="search-card">

        <div id="search-results"></div>

                </div>
                <div class="class-item">

                </div>
                <div class="class-item">
                    <div class="un-diamond un-c6"><div class="un-content"><div class="un-sym">☠️</div><div class="un-num">6</div></div></div>
                    <span>第 6 類<br>毒性/感染</span>
                </div>
                <div class="class-item">
                    <div class="un-diamond un-c7"><div class="un-content"><div class="un-sym">☢️</div><div class="un-num">7</div></div></div>
                    <span style="color:#ffeb3b;">第 7 類<br>放射性</span>
                </div>
                <div class="class-item">
                    <div class="un-diamond un-c8"><div class="un-content"><div class="un-sym">🧪</div><div class="un-num">8</div></div></div>
                    <span>第 8 類<br>腐蝕性</span>
                </div>
                <div class="class-item">
                    <div class="un-diamond un-c9"><div class="un-content"><div class="un-sym">⚠️</div><div class="un-num">9</div></div></div>
                    <span>第 9 類<br>其他危害</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 戰術資訊卡 -->
    <div id="detail-view" class="card">
        <h2 id="d-name" style="font-size: 1.4rem; color: var(--accent-color);">化學品名稱</h2>
        <div style="color: #aaa; margin-bottom: 15px;">CAS: <span id="d-cas"></span> | 類別: <span id="d-class" class="class-badge"></span></div>
        
        <hr style="border-color: #333;">

        <!-- NFPA 704 區塊 -->
        <div class="nfpa-wrapper">
            <div class="nfpa-diamond">
                <div class="nfpa-quad nfpa-red"><span id="nfpa-f">3</span></div>
                <div class="nfpa-quad nfpa-blue"><span id="nfpa-h">3</span></div>
                <div class="nfpa-quad nfpa-yellow"><span id="nfpa-r">1</span></div>
                <div class="nfpa-quad nfpa-white"><span id="nfpa-s"><s>W</s></span></div>
            </div>
            <div class="nfpa-legend">
                <div class="legend-item" style="color: #64b5f6;"><div class="color-box" style="background:#2196f3;"></div> 健康 (藍)</div>
                <div class="legend-item" style="color: #e57373;"><div class="color-box" style="background:#f44336;"></div> 易燃 (紅)</div>
                <div class="legend-item" style="color: #fff59d;"><div class="color-box" style="background:#ffeb3b;"></div> 反應性 (黃)</div>
                <div class="legend-item" style="color: #ffffff;"><div class="color-box" style="background:#ffffff;"></div> 特殊危害 (白)</div>
            </div>
        </div>

        <div class="data-row">
            <div class="data-label">GHS 危害標示</div>
            <div id="d-ghs" style="margin-top: 5px;"></div>
        </div>

        <div class="data-row">
            <div class="data-label">ERG 指南編號</div>
            <div class="data-value">Guide <span id="d-guide" style="color:var(--accent-color); font-size:1.3rem;"></span></div>
        </div>

        <div class="data-row warn-high">
            <div class="data-label">隔離與疏散距離 (初期)</div>
            <div class="data-value" id="d-iso"></div>
        </div>

        <div class="data-row warn-high">
            <div class="data-label">滅火與禁忌注意事項</div>
            <div class="data-value" id="d-tactics"></div>
        </div>

        <div class="data-row">
            <div class="data-label">ISO 裝備要求 (PPE)</div>
            <div class="data-value" id="d-ppe"></div>
        </div>
    </div>

        const inputEl = document.getElementById('search-input');
        const resultsEl = document.getElementById('search-results');
        const detailEl = document.getElementById('detail-view');

        function handleSearch() {
            const query = inputEl.value.trim().toLowerCase();
            resultsEl.innerHTML = '';

            if (query.length < 1) {
                resultsEl.style.display = 'none';
                return;
            }

            const matches = db.filter(item => 
                item.un.includes(query) || 
                item.nameTW.includes(query) || 
                item.nameEN.toLowerCase().includes(query) ||
                item.cas.includes(query)
            );

            if (matches.length > 0) {
                resultsEl.style.display = 'block';
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<span class="badge-un">UN ${item.un}</span> ${item.nameTW}`;
                    div.onclick = () => showDetail(item);
                    resultsEl.appendChild(div);
                });
            } else {
                resultsEl.style.display = 'block';
                resultsEl.innerHTML = `<div class="result-item" style="color:#aaa;">查無相符結果</div>`;
            }
        }

        function showDetail(item) {
            inputEl.value = item.nameTW;
            resultsEl.style.display = 'none';
            detailEl.style.display = 'block';
            
            document.querySelector('.class-ref-container').style.display = 'none';

            document.getElementById('d-name').innerText = `[UN ${item.un}] ${item.nameTW}`;
            document.getElementById('d-cas').innerText = item.cas;
            document.getElementById('d-class').innerText = `Class ${item.class}`;

            document.getElementById('nfpa-h').innerText = item.nfpa.h;
            document.getElementById('nfpa-f').innerText = item.nfpa.f;
            document.getElementById('nfpa-r').innerText = item.nfpa.r;
            document.getElementById('nfpa-s').innerHTML = item.nfpa.s || "-";

            const ghsBox = document.getElementById('d-ghs');
            ghsBox.innerHTML = '';
            item.ghs.forEach(g => {
                ghsBox.innerHTML += `<span class="ghs-badge">${g}</span>`;
            });

            document.getElementById('d-guide').innerText = item.erg;
            document.getElementById('d-iso').innerText = item.isolation;
            document.getElementById('d-tactics').innerText = item.tactics;
            document.getElementById('d-ppe').innerText = item.ppe;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetSearch() {
            inputEl.value = '';
            resultsEl.style.display = 'none';
            detailEl.style.display = 'none';
            document.querySelector('.class-ref-container').style.display = 'block';
        }
    </script>
